name: leonard_devtools
description: DevTools extension for Leonard.
version: 0.1.0
repository: https://github.com/memento-engineering/lenny
resolution: workspace

environment:
  flutter: ">=3.41.0"
  sdk: ^3.11.0

dependencies:
  devtools_extensions: ^0.4.0
  dtd: ^4.0.0
  flutter:
    sdk: flutter
  http: ^1.2.0
  json_rpc_2: ^3.0.2
  leonard_agent: ^0.1.0
  vm_service: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.1.0
  test: any

# Bundle the MaterialIcons font into the web build so glyphs like the settings
# gear render instead of tofu boxes. devtools_extensions sets
# uses-material-design: true; this package must match or icons are dropped.
flutter:
  uses-material-design: true
