# Packaged AI assets, surfaced to a consumer's coding agent by the Dart/Flutter
# MCP server because their app depends on leonard_flutter. Follows the
# "Packaged AI Assets" proposal (extension/mcp discovery format).
#
# FORWARD-COMPATIBLE: inert until the Dart/Flutter MCP server reads
# extension/mcp/config.yaml. The same capability ships TODAY, harness-native,
# via `dart run leonard_cli:install` (drops the drive-flutter-app skill +
# leonard-driver/leonard-pilot agents into the consumer's .agents/).
#
# Field schema (per the proposal):
#   resources/prompts entries: name (optional, defaults to file basename),
#   title (required), description (required), path (required, package-relative),
#   visibility (optional: public [default] | private).

resources:
  - name: driving_with_leonard
    title: "Driving a Flutter app with Leonard"
    description: >
      How to instrument this app (LeonardBinding.run / LeonardApp) and
      drive/verify its live UI end-to-end with an LLM via Leonard — for
      flows a widget test can't easily cover.
    path: extension/mcp/resources/driving-with-leonard.md

prompts:
  - name: drive_flutter_app
    title: "Drive this Flutter app toward a goal"
    description: >
      Drive the running, Leonard-instrumented app to accomplish a
      plain-English goal and report whether it succeeded.
    path: extension/mcp/prompts/drive-flutter-app.md
