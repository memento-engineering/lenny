include: package:lints/recommended.yaml
analyzer:
  exclude:
    # Untracked spike scratch (genesis de-risking, 2026-06-11) — reference
    # implementations whose path deps went stale when perception moved to
    # memento-engineering/genesis. Evidence snapshot: genesis docs/evidence/.
    - spikes/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
linter:
  rules:
    - prefer_single_quotes
    - sort_pub_dependencies
    - unawaited_futures
    - avoid_print
