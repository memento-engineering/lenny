<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lenny">
  <defs>
    <!-- noir field -->
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11141f"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="232" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <!-- warm instant-film paper -->
    <linearGradient id="paper" x1="106" y1="76" x2="406" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f4ed"/>
      <stop offset="1" stop-color="#e9e4d7"/>
    </linearGradient>
    <!-- the exposure is still "developing": image resolves from the top down -->
    <linearGradient id="develop" x1="0" y1="118" x2="0" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0c12" stop-opacity="0"/>
      <stop offset="0.62" stop-color="#0a0c12" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a0c12" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- app-icon field -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#field)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- the Polaroid: one instant, trustworthy snapshot -->
  <g transform="rotate(-5 256 256)">
    <!-- paper -->
    <rect x="106" y="76" width="300" height="360" rx="12" fill="url(#paper)" filter="url(#cardShadow)"/>

    <!-- exposure window -->
    <rect x="132" y="102" width="248" height="248" rx="5" fill="#0a0c12"/>

    <!-- syntax-highlighted code, abstracted to minimap gutter blocks -->
    <g>
