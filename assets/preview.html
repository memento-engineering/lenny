<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>lenny · icon preview</title>
<style>
  :root { --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .split { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
  .pane { padding: 56px 48px; }
  .dark  { background: #0c0f17; color: #dbe2f1; }
  .light { background: #f4f1ea; color: #1c2230; }
  h2 { font-family: var(--mono); font-weight: 600; font-size: .8rem; letter-spacing: 2px;
       text-transform: uppercase; opacity: .6; margin: 0 0 28px; }
  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; margin-bottom: 40px; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .chip span { font-family: var(--mono); font-size: .72rem; opacity: .5; }
  img { display: block; image-rendering: auto; }
  .s512 { width: 240px; height: 240px; border-radius: 22%; }
  .s128 { width: 128px; height: 128px; border-radius: 22%; }
  .s64  { width: 64px;  height: 64px;  border-radius: 22%; }
  .s32  { width: 32px;  height: 32px;  border-radius: 22%; }
  .s16  { width: 16px;  height: 16px;  border-radius: 22%; }
  .ctx { display: flex; align-items: center; gap: 12px; font-family: var(--mono);
         font-size: .95rem; padding: 10px 14px; border-radius: 10px; }
  .dark  .ctx { background: #11141f; border: 1px solid #1c2230; }
  .light .ctx { background: #ffffff; border: 1px solid #e2ddcf; }
  .ctx img { width: 22px; height: 22px; border-radius: 6px; }
</style>
</head>
<body>
<div class="split">
  <section class="pane dark">
    <h2>On noir (app field)</h2>
    <div class="row">
      <div class="chip"><img class="s512" src="lenny-mark.svg" alt=""><span>512</span></div>
      <div class="chip"><img class="s128" src="lenny-mark.svg" alt=""><span>128</span></div>
      <div class="chip"><img class="s64"  src="lenny-mark.svg" alt=""><span>64</span></div>
      <div class="chip"><img class="s32"  src="lenny-mark.svg" alt=""><span>32</span></div>
      <div class="chip"><img class="s16"  src="lenny-mark.svg" alt=""><span>16</span></div>
    </div>
    <div class="ctx"><img src="lenny-mark.svg" alt=""> lenny &nbsp;<span style="opacity:.5">· browser tab / favicon</span></div>
  </section>
  <section class="pane light">
    <h2>On paper (light surfaces)</h2>
    <div class="row">
      <div class="chip"><img class="s512" src="lenny-mark.svg" alt=""><span>512</span></div>
      <div class="chip"><img class="s128" src="lenny-mark.svg" alt=""><span>128</span></div>
      <div class="chip"><img class="s64"  src="lenny-mark.svg" alt=""><span>64</span></div>
      <div class="chip"><img class="s32"  src="lenny-mark.svg" alt=""><span>32</span></div>
      <div class="chip"><img class="s16"  src="lenny-mark.svg" alt=""><span>16</span></div>
    </div>
    <div class="ctx"><img src="lenny-mark.svg" alt=""> lenny &nbsp;<span style="opacity:.5">· README header</span></div>
  </section>
</div>
</body>
</html>
