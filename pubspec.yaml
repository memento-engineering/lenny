name: lenny_workspace
publish_to: none
environment:
  sdk: ^3.11.0
workspace:
  - packages/exploration_flutter
  - packages/exploration_flutter/example/diagnostic_fixture
  - packages/exploration_flutter/example/sample_app
  - packages/exploration_agent
  - packages/exploration_cli
  - packages/exploration_devtools
  - packages/exploration_router
  - packages/exploration_riverpod
  - packages/exploration_dio

dev_dependencies:
  melos: ^7.7.0

# genesis_perception (consumed by exploration_flutter) declares `genesis_tree: any`
# under `resolution: workspace`. From outside the genesis workspace, pub resolves
# that sibling to pub.dev (where it does not exist) and version-solving fails.
# Pin genesis_tree to the same git ref here — dependency_overrides must live at the
# workspace root. See docs/adrs/0002-perception-migration.md addendum (lenny-wisp-5h5).
dependency_overrides:
  genesis_tree:
    git:
      url: git@github.com:memento-engineering/genesis.git
      ref: 41ec0ec
      path: packages/tree

melos:
  scripts:
    # ---------- primary scripts ----------
    test:
      description: >-
        Run all unit/widget tests (excludes perf tests in exploration_devtools
        and excludes the env-gated dogfood e2e). Runs dart test on pure-Dart
        packages and flutter test on Flutter packages.
      steps:
        - test:dart
        - test:flutter

    analyze:
      description: >-
        Run dart analyze on the entire workspace.
      run: dart analyze

    format:
      description: >-
        Check formatting for all Dart files. Fails if any file needs changes.
      run: dart format --output=none --set-exit-if-changed .

    test:e2e:
      description: >-
        Run the live dogfood e2e test against swift-infer.
        Requires SWIFT_INFER_ENDPOINT and SWIFT_INFER_AGENT_TOKEN to be set.
        The test self-skips when those vars are absent, so this script is safe
        to invoke locally - it will simply report all tests skipped.
      run: >-
        dart test packages/exploration_agent/test/e2e/dogfood_e2e_test.dart

    # ---------- private sub-scripts (not listed by melos run) ----------
    test:dart:
      private: true
      description: dart test on pure-Dart packages (exploration_agent, exploration_cli)
      exec: dart test
      packageFilters:
        flutter: false

    test:flutter:
      private: true
      description: flutter test on Flutter packages; exploration_devtools skips perf tags via dart_test.yaml
      exec: flutter test
      packageFilters:
        flutter: true
        ignore:
          - "**/example/**"
