name: lenny_workspace
publish_to: none
environment:
  sdk: ^3.11.0
workspace:
  - packages/leonard_flutter
  - packages/leonard_flutter/example/diagnostic_fixture
  - packages/leonard_flutter/example/sample_app
  - packages/leonard_agent
  - packages/leonard_cli
  - packages/leonard_devtools
  - packages/leonard_router
  - packages/leonard_riverpod
  - packages/leonard_dio
  - packages/leonard_tmux

# TEMPORARY: genesis_perception 0.1.2 and genesis_tmux 0.1.0 are not yet on
# pub.dev. Resolve them from the public genesis repo until they publish, then
# delete this block and use the hosted constraints.
dependency_overrides:
  genesis_perception:
    git:
      url: https://github.com/memento-engineering/genesis.git
      path: packages/perception
      ref: main
  genesis_tmux:
    git:
      url: https://github.com/memento-engineering/genesis.git
      path: packages/tmux
      ref: main

dev_dependencies:
  melos: ^7.7.0

melos:
  scripts:
    # ---------- primary scripts ----------
    test:
      description: >-
        Run all unit/widget tests (excludes perf tests in leonard_devtools
        and excludes the env-gated dogfood e2e). Runs dart test on pure-Dart
        packages and flutter test on Flutter packages.
      steps:
        - test:dart
        - test:flutter

    analyze:
      description: >-
        Run dart analyze on the entire workspace.
      run: dart analyze

    format:
      description: >-
        Check formatting for all Dart files. Fails if any file needs changes.
      run: dart format --output=none --set-exit-if-changed .

    test:e2e:
      description: >-
        Run the live dogfood e2e test against swift-infer.
        Requires SWIFT_INFER_ENDPOINT and SWIFT_INFER_AGENT_TOKEN to be set.
        The test self-skips when those vars are absent, so this script is safe
        to invoke locally - it will simply report all tests skipped.
      run: >-
        dart test packages/leonard_agent/test/e2e/dogfood_e2e_test.dart

    # ---------- private sub-scripts (not listed by melos run) ----------
    test:dart:
      private: true
      description: dart test on pure-Dart packages (leonard_agent, leonard_cli)
      exec: dart test
      packageFilters:
        flutter: false

    test:flutter:
      private: true
      description: flutter test on Flutter packages; leonard_devtools skips perf tags via dart_test.yaml
      exec: flutter test
      packageFilters:
        flutter: true
        ignore:
          - "**/example/**"
