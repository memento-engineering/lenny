name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - run: dart pub get
      - run: dart pub global activate melos
      - run: ./tool/build_devtools_extension.sh
      - run: dart analyze
      - run: ./tool/check_no_dart_io.sh
      - run: melos run test --no-select
