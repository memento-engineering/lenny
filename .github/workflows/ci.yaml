name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - run: dart pub get
      - run: dart pub global activate melos
      - run: ./tool/build_devtools_extension.sh
      - run: dart analyze
      - run: ./tool/check_no_dart_io.sh
      - run: melos run test --no-select
  # Stable required-check name for branch protection. Pin protection to
  # `ci-required` so renaming the jobs above never silently un-gates merges.
  ci-required:
    if: always()
    needs: [analyze-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.analyze-and-test.result }}" != "success" ]; then
            echo "analyze-and-test did not succeed: ${{ needs.analyze-and-test.result }}"
            exit 1
          fi
