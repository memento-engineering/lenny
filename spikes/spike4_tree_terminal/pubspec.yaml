name: spike4_tree_terminal
description: >-
  Spike 4: tree -> terminal end-to-end via the Watch dirty set. A live
  perception tree containing Watch-driven state renders to spike 2's
  double-buffered cell grid; a stream event flows event -> perceived() ->
  owner dirty set -> onNeedsHarvest -> flushHarvest -> targeted repaint ->
  minimal ANSI diff, with repaint locality. De-risks genesis A4 (live
  human-facing TUI backend driven off the SAME element tree).
publish_to: none
environment:
  sdk: ^3.11.0
dependencies:
  perception:
    path: ../../packages/perception
  spike2_cell_grid:
    path: ../spike2_cell_grid
  spike3_schema_roundtrip:
    path: ../spike3_schema_roundtrip
dev_dependencies:
  test: ^1.25.0
