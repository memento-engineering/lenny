name: spike5_action_roundtrip
description: >-
  Spike 5: A2UI action round-trip, setState flavor. A surface emitted from a
  catalog carries an ACTION affordance (declared in the catalog, projected
  into the LLM tool schema); a client-fired A2UI v0.9 action message is
  routed back as an INTENT and hit-tested against the LIVE mounted
  perception tree — ENFORCED via PerceptionState.perceived() (invalidating
  exactly the target subtree) when valid, REJECTED with a structured reason
  (tree untouched) when not — with last-write-wins semantics for racing
  writes. De-risks genesis A5; informs the parked multi-party-consensus
  decision; exercises spike3 generator reuse for A2.
publish_to: none
environment:
  sdk: ^3.11.0
dependencies:
  perception:
    path: ../../packages/perception
  spike3_schema_roundtrip:
    path: ../spike3_schema_roundtrip
dev_dependencies:
  test: ^1.25.0
